<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Profile - JOYWORK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from {opacity: 0;transform: translateY(30px);}
            to {opacity: 1;transform: translateY(0);}
        }
        .profile-header {margin-bottom: 30px;}
        .avatar {
            width: 150px;height: 150px;border-radius: 50%;margin: 0 auto 20px;
            border: 5px solid #667eea;object-fit: cover;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {0%, 100% {transform: translateY(0px);}50% {transform: translateY(-10px);}}
        .name {font-size: 28px;font-weight: 700;color: #333;margin-bottom: 10px;}
        .position {font-size: 16px;color: #667eea;font-weight: 600;margin-bottom: 5px;text-transform: uppercase;letter-spacing: 1px;}
        .company {font-size: 14px;color: #999;margin-bottom: 20px;}
        .divider {width: 50px;height: 3px;background: linear-gradient(90deg, #667eea, #764ba2);margin: 20px auto;border-radius: 2px;}
        .bio {font-size: 14px;color: #666;line-height: 1.6;margin-bottom: 30px;}
        .social-links {display: flex;justify-content: center;gap: 20px;margin-bottom: 30px;flex-wrap: wrap;}
        .social-btn {width: 50px;height: 50px;border-radius: 50%;display: flex;justify-content: center;align-items: center;text-decoration: none;color: white;font-size: 20px;transition: all 0.3s ease;cursor: pointer;border: none;}
        .facebook {background: linear-gradient(135deg, #667eea, #764ba2);}
        .zalo {background: linear-gradient(135deg, #0084ff, #0073e6);}
        .linkedin {background: linear-gradient(135deg, #0077B5, #005885);}
        .social-btn:hover {transform: scale(1.2) translateY(-5px);box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);}
        .gift-btn {
            width: 100%;padding: 15px 30px;background: linear-gradient(135deg, #667eea, #764ba2);color: white;border: none;border-radius: 50px;font-size: 16px;font-weight: 600;cursor: pointer;transition: all 0.3s ease;text-transform: uppercase;letter-spacing: 1px;box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);margin-bottom: 30px;
        }
        .gift-btn:hover {transform: translateY(-3px);box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);}
        .gift-btn:active {transform: translateY(-1px);}
        /* -- Memory Game styles -- */
        .memory-section {
            background:#f3f6fd;
            border-radius:18px;
            padding:28px 12px 22px 12px;
            margin-left: 24px;
            box-shadow: 0 5px 20px rgba(102,126,234,0.10);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .memory-board, #memory-game-board {
            display: grid;
            grid-template-columns: repeat(6, 40px);
            gap: 10px;
            justify-content: center;
            margin-left: 24px;
        }
        .memory-card {
            width: 40px;
            height: 40px;
            background: #667eea88;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow:0 2px 6px rgba(76,71,160,0.08);
            user-select: none;
            color:#fff;
            transition:background 0.2s,transform 0.2s;
        }
        .memory-card.flipped, .memory-card.matched {
            background:#fff;color:#667eea;cursor:default;transform:scale(1.1);
        }
        /* -- end Memory Game -- */
        .message-section {background: #f8f9fa;padding: 25px;border-radius: 15px;margin-top: 20px;}
        .message-section h3 {font-size: 18px;color: #333;margin-bottom: 20px;font-weight: 700;}
        .form-group {margin-bottom: 15px;text-align: left;}
        .form-group label {display: block;font-size: 14px;font-weight: 600;color: #333;margin-bottom: 8px;}
        .form-group input,.form-group textarea {width: 100%;padding: 12px;border: 2px solid #e0e0e0;border-radius: 8px;font-family: inherit;font-size: 14px;transition: all 0.3s ease;resize: vertical;}
        .form-group input:focus,.form-group textarea:focus {outline: none;border-color: #667eea;box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);}
        .form-group textarea {min-height: 100px;}
        .submit-btn {width: 100%;padding: 12px;background: linear-gradient(135deg, #667eea, #764ba2);color: white;border: none;border-radius: 8px;font-size: 14px;font-weight: 600;cursor: pointer;transition: all 0.3s ease;}
        .submit-btn:hover {transform: translateY(-2px);box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);}
        .messages-list {margin-top: 25px;max-height: 400px;overflow-y: auto;}
        .message-item {background: white;padding: 15px;border-radius: 10px;margin-bottom: 12px;border-left: 4px solid #667eea;animation: slideIn 0.3s ease-out;}
        @keyframes slideIn {from {opacity: 0;transform: translateX(-10px);}to {opacity: 1;transform: translateX(0);}}
        .message-author {font-weight: 700;color: #667eea;font-size: 14px;margin-bottom: 5px;}
        .message-text {color: #555;font-size: 13px;line-height: 1.5;}
        .message-time {font-size: 12px;color: #999;margin-top: 8px;}
        .firework-particle {position: fixed;width: 10px;height: 10px;border-radius: 50%;pointer-events: none;}
        @keyframes explode {0% {opacity: 1;transform: translate(0, 0) scale(1);}100% {opacity: 0;transform: translate(var(--tx), var(--ty)) scale(0);}}
        .particle {animation: explode 1s ease-out forwards;}
        @media (max-width: 480px) {
            .container {padding: 30px 20px;}
            .name {font-size: 24px;}
            .avatar {width: 120px;height: 120px;}
            .message-section {padding: 20px;}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <img src="https://via.placeholder.com/150?text=Your+Photo" alt="Avatar" class="avatar" id="avatar">
            <p class="position">Nhân viên</p>
            <h1 class="name">Họ Tên Của Bạn</h1>
            <p class="company">JOYWORK</p>
            <div class="divider"></div>
            <p class="bio">Đam mê công nghệ, sáng tạo và phát triển bản thân. Luôn sẵn sàng hợp tác và tạo nên những điều tuyệt vời.</p>
        </div>
        <div class="social-links">
            <a href="https://www.facebook.com" target="_blank" class="social-btn facebook" title="Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="https://zalo.me" target="_blank" class="social-btn zalo" title="Zalo">
                <i class="fab fa-comment"></i>
            </a>
            <a href="https://www.linkedin.com" target="_blank" class="social-btn linkedin" title="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </div>
        <button class="gift-btn" onclick="triggerFireworks()">🎁 Tặng Quà</button>
        <div class="memory-section">
            <h2 style="color:#667eea; margin-bottom:16px;">🎮 Memory Game</h2>
            <div id="memory-game-board"></div>
            <div id="memory-info" style="margin-top:10px; color:#667eea;"></div>
            <button id="memory-replay" style="margin-top:14px; padding:7px 25px; border-radius:6px; background:linear-gradient(135deg, #667eea, #764ba2); color:white; border:none; cursor:pointer;" onclick="startMemoryGame()">Chơi lại</button>
        </div>
        <div class="message-section">
            <h3>📝 Để Lại Lời Nhắn</h3>
            <div class="form-group">
                <label for="senderName">Tên của bạn:</label>
                <input type="text" id="senderName" placeholder="Nhập tên của bạn...">
            </div>
            <div class="form-group">
                <label for="messageText">Lời nhắn:</label>
                <textarea id="messageText" placeholder="Viết lời nhắn của bạn..."></textarea>
            </div>
            <button class="submit-btn" onclick="sendMessage()">Gửi Lời Nhắn</button>
            <div class="messages-list" id="messagesList"></div>
        </div>
    </div>
    <script>
    const profileData = {
        name: "Đặng Thị Phương Thanh",
        position: "Lễ Tân",
        company: "JOYWORK",
        bio: "Đam mê công nghệ, sáng tạo và phát triển bản thân. Luôn sẵn sàng hợp tác và tạo nên những điều tuyệt vời.",
        avatar: "https://thichtrangtri.com/wp-content/uploads/2025/05/anh-meo-bua-cute-1%E2%80%8B.jpg",
        facebook: "https://www.facebook.com/PTD.QF",
        zalo: "https://zalo.me/0983296093",
        linkedin: "https://www.linkedin.com/in/your-profile/"
    };
    document.querySelector('.name').textContent = profileData.name;
    document.querySelector('.position').textContent = profileData.position;
    document.querySelector('.company').textContent = profileData.company;
    document.querySelector('.bio').textContent = profileData.bio;
    document.getElementById('avatar').src = profileData.avatar;
    document.querySelectorAll('.social-btn')[0].href = profileData.facebook;
    document.querySelectorAll('.social-btn')[1].href = profileData.zalo;
    document.querySelectorAll('.social-btn')[2].href = profileData.linkedin;
    let messages = JSON.parse(localStorage.getItem('messages')) || [];
    displayMessages();
    function sendMessage() {
        const senderName = document.getElementById('senderName').value.trim();
        const messageText = document.getElementById('messageText').value.trim();
        if (!senderName || !messageText) {
            alert('Vui lòng nhập tên và lời nhắn!');return;
        }
        const newMessage = {
            id: Date.now(),
            author: senderName,
            text: messageText,
            time: new Date().toLocaleString('vi-VN')
        };
        messages.unshift(newMessage);
        localStorage.setItem('messages', JSON.stringify(messages));
        document.getElementById('senderName').value = '';
        document.getElementById('messageText').value = '';
        displayMessages();
    }
    function displayMessages() {
        const messagesList = document.getElementById('messagesList');
        messagesList.innerHTML = '';
        if (messages.length === 0) {
            messagesList.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Chưa có lời nhắn nào 😊</p>';
            return;
        }
        messages.forEach(msg => {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-item';
            messageDiv.innerHTML = `<div class="message-author">${escapeHtml(msg.author)}</div><div class="message-text">${escapeHtml(msg.text)}</div><div class="message-time">${msg.time}</div>`;
            messagesList.appendChild(messageDiv);
        });
    }
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    function triggerFireworks() {
        const colors = ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe', '#ff6b6b', '#ffd93d'];
        const particleCount = 50;
        for (let i = 0; i < particleCount; i++) {
            createParticle(colors[Math.floor(Math.random() * colors.length)]);
        }
        playSound();
    }
    function createParticle(color) {
        const particle = document.createElement('div');
        particle.className = 'firework-particle particle';
        particle.style.backgroundColor = color;
        const startX = window.innerWidth / 2;
        const startY = window.innerHeight / 2;
        const angle = (Math.random() * 360) * (Math.PI / 180);
        const velocity = 5 + Math.random() * 10;
        const tx = Math.cos(angle) * velocity * 50;
        const ty = Math.sin(angle) * velocity * 50;
        particle.style.left = startX + 'px';
        particle.style.top = startY + 'px';
        particle.style.setProperty('--tx', tx + 'px');
        particle.style.setProperty('--ty', ty + 'px');
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 1000);
    }
    function playSound() {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioContext.currentTime;
            for (let i = 0; i < 3; i++) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.setValueAtTime(200 + i * 100, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now + i * 0.05);
                osc.stop(now + 0.1 + i * 0.05);
            }
        } catch (e) {console.log('Audio not available');}
    }
    function startMemoryGame() {
        const emojis = ['🐧','🎈','🍀','🌻','🐱','🌙','🎁','😻','🍰','🌸','🌟','🍎'];
        const duplicate = [...emojis, ...emojis];
        let shuffled = duplicate.sort(() => 0.5 - Math.random());
        let html = '<div class="memory-board">';
        shuffled.forEach((emj,i)=>{ html += `<div class="memory-card" data-idx="${i}" data-emoji="${emj}"></div>`; });
        html += '</div>';
        document.getElementById('memory-game-board').innerHTML = html;
        let opened = [], lock=false, matched=0, moves=0;
        document.querySelectorAll('.memory-card').forEach(card => {
            card.onclick = function(){
                if(lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
                card.classList.add('flipped');
                card.textContent = card.dataset.emoji;
                opened.push(card);
                if(opened.length===2){
                    moves++;
                    if(opened[0].dataset.emoji===opened[1].dataset.emoji){
                        opened[0].classList.add('matched');
                        opened[1].classList.add('matched');
                        matched++;
                        if(matched===12){
                            document.getElementById('memory-info').innerHTML = `🎉 Hoàn thành sau <b>${moves}</b> lần!`;
                        }
                        opened=[];
                    }else{
                        lock=true;
                        setTimeout(()=>{
                            opened[0].classList.remove('flipped');
                            opened[1].classList.remove('flipped');
                            opened[0].textContent='';
                            opened[1].textContent='';
                            opened=[]; lock=false;
                        },900);
                    }
                    document.getElementById('memory-info').innerHTML = `Đã lật: <b>${moves}</b> lần`;
                }
            };
        });
        document.getElementById('memory-info').innerHTML = "Bắt đầu lật để tìm cặp giống nhau nhé!";
    }
    startMemoryGame();
    </script>
</body>
</html>
